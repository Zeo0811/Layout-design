<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>十字路口排版专用</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- 顶部 Header -->
    <header class="header">
      <div class="header-left">
        <span class="logo">
          <img src="../icons/icon48.png" width="28" height="28" alt="logo" />
        </span>
        <div>
          <div class="app-name">十字路口排版</div>
          <div id="appSub" class="app-sub">Notion / 飞书 → 微信公众号</div>
        </div>
      </div>
      <span id="badge" class="badge badge--unknown">检测中...</span>
    </header>

    <!-- 排版模板选择 -->
    <div class="template-row">
      <span class="template-label">排版模板</span>
      <select id="templateSelect" class="template-select">
        <option value="">默认样式</option>
      </select>
      <button id="syncBtn" class="btn-sync" title="从服务器同步模板">↻ 同步</button>
    </div>

    <!-- 状态提示（两种模式公用） -->
    <div id="statusBar" class="status-bar status-bar--hidden">
      <span id="statusIcon" class="status-icon">⏳</span>
      <span id="statusText">处理中...</span>
    </div>

    <!-- ── Notion / 飞书 转换模式 ── -->
    <div id="convert-panel">

      <!-- 操作按钮区 -->
      <div class="toolbar">
        <button id="convertBtn" class="btn btn--primary">
          <span class="btn-icon">⚡</span>
          一键转换
        </button>
        <button id="copyBtn" class="btn btn--secondary" disabled>
          <span class="btn-icon">📋</span>
          完整复制
        </button>
      </div>

      <!-- 分段复制行（转换后显示） -->
      <div id="segmentRow" class="segment-row hidden">
        <span class="segment-label">分段复制：</span>
        <div id="segmentBtns" class="segment-btns"></div>
      </div>

      <!-- 预览区域 -->
      <div class="preview-panel">
        <div class="preview-header">
          <span class="preview-title">预览</span>
          <span id="stats" class="preview-stats"></span>
        </div>
        <div id="preview" class="preview-body">
          <div class="empty-state">
            <div class="empty-icon">📄</div>
            <div class="empty-text">打开 Notion 或飞书文章页面<br>点击「一键转换」开始处理</div>
          </div>
        </div>
      </div>

      <!-- 图片提示 -->
      <div id="imageNote" class="image-note hidden">
        <span class="image-note-icon">🖼</span>
        <span id="imageNoteText">图片已转 Base64，可离线显示</span>
      </div>

    </div><!-- /convert-panel -->

    <!-- ── 微信公众号排版提取模式 ── -->
    <div id="wechat-panel" class="wechat-panel hidden">
      <div class="wechat-hero">
        <div class="wechat-hero-icon">🎨</div>
        <div class="wechat-hero-title">复制该公众号排版风格</div>
        <div class="wechat-hero-desc">自动提取文章的字体、颜色、间距等排版属性，<br>保存为可复用模板，并可在网页端精细编辑</div>
      </div>
      <div class="wechat-form">
        <input id="wechat-tpl-name" class="wechat-name-input"
               type="text" placeholder="输入模板名称（如：新榜风格）" />
        <button id="extractBtn" class="btn btn--extract">
          <span class="btn-icon">✨</span>
          提取并保存为模板
        </button>
      </div>
      <div class="wechat-tips">
        <div class="wechat-tip-item">📐 提取粒度：段落、标题、引用、列表、图片等</div>
        <div class="wechat-tip-item">✏️ 保存后可在网页端逐项编辑调整</div>
      </div>
    </div><!-- /wechat-panel -->

  </div>

  <script src="highlight.min.js"></script>
  <script src="formatter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
